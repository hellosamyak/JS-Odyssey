<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document (React)</title>
</head>

<body style="background-color: #212121; color: #fff;">
  <h3>Click on the button to learn about the bind keyword in JS👇</h1>
    <button>Click here</button>
</body>
<script>
  class React {
    constructor() {
      this.library = 'react'
      this.server = 'http://localhost:5173/'

      // requirement: as the page loads, an object must be created, then to get the reference of the btn & a message of btn clicked or something similar, through a method like handleClick
      document.querySelector('button').addEventListener('click', this.handleClick.bind(this))
    }
    handleClick() {
      console.log('Button clicked!')
      console.log(this.server)
    }
  }

  const App = new React()
</script>

</html>
