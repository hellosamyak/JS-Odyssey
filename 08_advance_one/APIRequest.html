<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XMLHttpRequest</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f4f6fb;
    }

    .profile-box {
      width: 320px;
      padding: 24px;
      text-align: center;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    .profile-box p {
      margin-bottom: 20px;
      font-weight: bold;
      color: #333;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .profile {
      display: none;
      margin-top: 24px;
    }

    .profile img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #2563eb;
    }

    .username {
      margin: 14px 0 8px;
      font-size: 22px;
      color: #111827;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-top: 16px;
      color: #374151;
    }

    .stats strong {
      display: block;
      color: #111827;
      font-size: 20px;
    }
  </style>
</head>

<body style="background-color: #212121; color: #fff">
  <div class="profile-box">
    <p>HEY! Let's learn XML HTTP REQUEST.</p>

    <button>Show Profile</button>

    <div class="profile" id="profile">
      <img id="profilePic" src="" alt="Profile picture" />
      <h2 class="username" id="username"></h2>

      <div class="stats">
        <div>
          <strong id="followers"></strong>
          Followers
        </div>
        <div>
          <strong id="following"></strong>
          Following
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
